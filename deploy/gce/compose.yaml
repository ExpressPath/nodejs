services:
  helper:
    build:
      context: ../..
      dockerfile: ../../Dockerfile
    image: ivucx-helper:gce
    container_name: ivucx-helper
    restart: unless-stopped
    env_file:
      - ./.env.runtime
    ports:
      - "${HELPER_HTTP_PORT:-80}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
